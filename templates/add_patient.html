{% extends 'base.html' %}

{% block title %}Add Patient{% endblock %}
{% block header_title %}Add Patient{% endblock %}

{% block content %}

<div class="page-header reveal">
    <h1>Add New Patient</h1>
    <p>Enter the patient's personal and contact information</p>
</div>

<div class="glass-card form-card reveal reveal-delay-1">

    <form method="POST" id="add-patient-form">

        <div class="form-group">
            <label class="form-label" for="name">Full Name</label>
            <input type="text" name="name" id="name" class="form-input"
                   placeholder="Enter patient's full name" required>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label" for="age">Age</label>
                <input type="number" name="age" id="age" class="form-input"
                       placeholder="Age" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="gender">Gender</label>
                <select name="gender" id="gender" class="form-select">
                    <option value="">Select Gender</option>
                    <option value="Male">Male</option>
                    <option value="Female">Female</option>
                    <option value="Other">Other</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label" for="contact">Contact Number</label>
            <input type="text" name="contact" id="contact" class="form-input"
                   placeholder="Enter phone number">
        </div>

        <div class="form-group">
            <label class="form-label" for="address">Address</label>
            <input type="text" name="address" id="address" class="form-input"
                   placeholder="Enter address">
        </div>

        <div class="form-divider"></div>

        <div class="flex gap-4">
            <button type="submit" class="btn btn-primary btn-lg" style="flex:1;" id="submit-patient">
                <i data-lucide="plus-circle"></i>
                Add Patient
            </button>
            <a href="/patients" class="btn btn-ghost btn-lg" id="cancel-patient">Cancel</a>
        </div>

    </form>

</div>

{% endblock %}
