{% extends 'base.html' %}

{% block title %}Add ICU Record{% endblock %}
{% block header_title %}Add ICU Record{% endblock %}

{% block content %}

<div class="page-header reveal">
    <h1>Add ICU Details</h1>
    <p>Record ICU admission details for a patient</p>
</div>

<div class="glass-card form-card reveal reveal-delay-1">

    <div class="info-bar mb-6">
        <i data-lucide="alert-triangle"></i>
        <span>Only admissions flagged as ICU-required are shown below</span>
    </div>

    <form method="POST" id="add-icu-form">

        <div class="form-group">
            <label class="form-label" for="admission_id">Select Admission</label>
            <select name="admission_id" id="admission_id" class="form-select" required>
                <option value="">— Choose ICU Admission —</option>
                {% for a in admissions %}
                <option value="{{ a[0] }}">{{ a[1] }} — Admitted: {{ a[2] }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label" for="bed_number">Bed Number</label>
                <input type="text" name="bed_number" id="bed_number" class="form-input"
                       placeholder="e.g. ICU-01" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="daily_cost">Daily Cost (₹)</label>
                <input type="number" step="0.01" name="daily_cost" id="daily_cost"
                       class="form-input" value="2500.00" required>
            </div>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label" for="icu_start_date">ICU Start Date</label>
                <input type="date" name="icu_start_date" id="icu_start_date"
                       class="form-input" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="icu_end_date">ICU End Date (optional)</label>
                <input type="date" name="icu_end_date" id="icu_end_date"
                       class="form-input">
            </div>
        </div>

        <div class="form-divider"></div>

        <div class="flex gap-4">
            <button type="submit" class="btn btn-danger btn-lg" style="flex:1;" id="submit-icu">
                <i data-lucide="heart-pulse"></i>
                Admit to ICU
            </button>
            <a href="/admissions" class="btn btn-ghost btn-lg" id="cancel-icu">Cancel</a>
        </div>

    </form>

</div>

{% endblock %}
