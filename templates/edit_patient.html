{% extends 'base.html' %}

{% block title %}Edit Patient{% endblock %}
{% block header_title %}Edit Patient{% endblock %}

{% block content %}

<div class="page-header reveal">
    <h1>Edit Patient</h1>
    <p>Update patient information</p>
</div>

<div class="glass-card form-card reveal reveal-delay-1">

    <form method="POST" id="edit-patient-form">

        <div class="form-group">
            <label class="form-label" for="name">Full Name</label>
            <input type="text" name="name" id="name" class="form-input"
                   value="{{ patient[1] }}" required>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label" for="age">Age</label>
                <input type="number" name="age" id="age" class="form-input"
                       value="{{ patient[2] }}" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="gender">Gender</label>
                <select name="gender" id="gender" class="form-select">
                    <option value="Male" {% if patient[3] == 'Male' %}selected{% endif %}>Male</option>
                    <option value="Female" {% if patient[3] == 'Female' %}selected{% endif %}>Female</option>
                    <option value="Other" {% if patient[3] == 'Other' %}selected{% endif %}>Other</option>
                </select>
            </div>
        </div>

        <div class="form-group">
            <label class="form-label" for="contact">Contact Number</label>
            <input type="text" name="contact" id="contact" class="form-input"
                   value="{{ patient[4] }}">
        </div>

        <div class="form-group">
            <label class="form-label" for="address">Address</label>
            <input type="text" name="address" id="address" class="form-input"
                   value="{{ patient[5] }}">
        </div>

        <div class="form-divider"></div>

        <div class="flex gap-4">
            <button type="submit" class="btn btn-primary btn-lg" style="flex:1;" id="update-patient">
                <i data-lucide="save"></i>
                Update Patient
            </button>
            <a href="/patients" class="btn btn-ghost btn-lg" id="cancel-edit-patient">Cancel</a>
        </div>

    </form>

</div>

{% endblock %}
