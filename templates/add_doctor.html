{% extends 'base.html' %}

{% block title %}Add Doctor{% endblock %}
{% block header_title %}Add Doctor{% endblock %}

{% block content %}

<div class="page-header reveal">
    <h1>Add New Doctor</h1>
    <p>Enter the doctor's professional details</p>
</div>

<div class="glass-card form-card reveal reveal-delay-1">

    <form method="POST" id="add-doctor-form">

        <div class="form-group">
            <label class="form-label" for="name">Doctor Name</label>
            <input type="text" name="name" id="name" class="form-input"
                   placeholder="Enter doctor's full name" required>
        </div>

        <div class="form-group">
            <label class="form-label" for="specialization">Specialization</label>
            <input type="text" name="specialization" id="specialization" class="form-input"
                   placeholder="e.g. Cardiology, Neurology, Orthopedics" required>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label" for="contact">Contact Number</label>
                <input type="text" name="contact" id="contact" class="form-input"
                       placeholder="Phone number">
            </div>
            <div class="form-group">
                <label class="form-label" for="experience">Experience (Years)</label>
                <input type="number" name="experience" id="experience" class="form-input"
                       placeholder="Years of experience">
            </div>
        </div>

        <div class="form-divider"></div>

        <div class="flex gap-4">
            <button type="submit" class="btn btn-primary btn-lg" style="flex:1;" id="submit-doctor">
                <i data-lucide="plus-circle"></i>
                Add Doctor
            </button>
            <a href="/doctors" class="btn btn-ghost btn-lg" id="cancel-doctor">Cancel</a>
        </div>

    </form>

</div>

{% endblock %}
