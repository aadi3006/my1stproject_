{% extends 'base.html' %}

{% block title %}Edit Doctor{% endblock %}
{% block header_title %}Edit Doctor{% endblock %}

{% block content %}

<div class="page-header reveal">
    <h1>Edit Doctor</h1>
    <p>Update doctor profile information</p>
</div>

<div class="glass-card form-card reveal reveal-delay-1">

    <form method="POST" id="edit-doctor-form">

        <div class="form-group">
            <label class="form-label" for="name">Doctor Name</label>
            <input type="text" name="name" id="name" class="form-input"
                   value="{{ doctor[1] }}">
        </div>

        <div class="form-group">
            <label class="form-label" for="specialization">Specialization</label>
            <input type="text" name="specialization" id="specialization" class="form-input"
                   value="{{ doctor[2] }}">
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label" for="contact">Contact Number</label>
                <input type="text" name="contact" id="contact" class="form-input"
                       value="{{ doctor[3] }}">
            </div>
            <div class="form-group">
                <label class="form-label" for="experience">Experience (Years)</label>
                <input type="number" name="experience" id="experience" class="form-input"
                       value="{{ doctor[4] }}">
            </div>
        </div>

        <div class="form-divider"></div>

        <div class="flex gap-4">
            <button type="submit" class="btn btn-primary btn-lg" style="flex:1;" id="update-doctor">
                <i data-lucide="save"></i>
                Update Doctor
            </button>
            <a href="/doctors" class="btn btn-ghost btn-lg" id="cancel-edit-doctor">Cancel</a>
        </div>

    </form>

</div>

{% endblock %}
