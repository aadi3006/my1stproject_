{% extends 'base.html' %}

{% block title %}Add Appointment{% endblock %}
{% block header_title %}Add Appointment{% endblock %}

{% block content %}

<div class="page-header reveal">
    <h1>Schedule Appointment</h1>
    <p>Book a new patient-doctor appointment</p>
</div>

<div class="glass-card form-card reveal reveal-delay-1">

    <form method="POST" id="add-appointment-form">

        <div class="form-group">
            <label class="form-label" for="patient_id">Select Patient</label>
            <select name="patient_id" id="patient_id" class="form-select" required>
                <option value="">— Choose Patient —</option>
                {% for p in patients %}
                <option value="{{ p[0] }}">{{ p[1] }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-group">
            <label class="form-label" for="doctor_id">Select Doctor</label>
            <select name="doctor_id" id="doctor_id" class="form-select" required>
                <option value="">— Choose Doctor —</option>
                {% for d in doctors %}
                <option value="{{ d[0] }}">{{ d[1] }} — {{ d[2] }}</option>
                {% endfor %}
            </select>
        </div>

        <div class="form-row">
            <div class="form-group">
                <label class="form-label" for="appointment_date">Date & Time</label>
                <input type="datetime-local" name="appointment_date" id="appointment_date"
                       class="form-input" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="status">Status</label>
                <select name="status" id="status" class="form-select">
                    <option value="Scheduled">Scheduled</option>
                    <option value="Completed">Completed</option>
                    <option value="Cancelled">Cancelled</option>
                </select>
            </div>
        </div>

        <div class="form-divider"></div>

        <div class="flex gap-4">
            <button type="submit" class="btn btn-primary btn-lg" style="flex:1;" id="submit-appointment">
                <i data-lucide="calendar-check"></i>
                Schedule Appointment
            </button>
            <a href="/appointments" class="btn btn-ghost btn-lg" id="cancel-appointment">Cancel</a>
        </div>

    </form>

</div>

{% endblock %}
